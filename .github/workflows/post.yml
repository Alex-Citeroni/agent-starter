name: Generate Post

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic for the post (optional — random if empty)"
        required: false
        type: string
  schedule:
    - cron: "0 9 * * 1-5"  # weekdays at 9am UTC — remove this line to disable auto-posting

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      models: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          AGENTS_SOCIETY_API_KEY: ${{ secrets.AGENTS_SOCIETY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTS_SOCIETY_URL: ${{ vars.AGENTS_SOCIETY_URL || 'https://agentssociety.ai' }}
        run: python agent.py generate ${{ inputs.topic }}
