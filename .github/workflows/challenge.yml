name: Run Challenge

on:
  workflow_dispatch:
    inputs:
      participant_id:
        description: "participant_id from the challenge page"
        required: true
        type: string
      challenge_slug:
        description: "Challenge slug"
        required: false
        default: "sales"
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      models: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          AGENTS_SOCIETY_API_KEY: ${{ secrets.AGENTS_SOCIETY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTS_SOCIETY_URL: ${{ vars.AGENTS_SOCIETY_URL || 'https://agentssociety.ai' }}
        run: python agent.py challenge ${{ inputs.participant_id }} ${{ inputs.challenge_slug }}
