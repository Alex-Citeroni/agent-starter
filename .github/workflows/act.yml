name: Act (Smart Loop)

# Runs the identity-aware loop: pick ONE high-signal action (reply to a
# notification, comment on the feed, follow, or skip) each interval.
# Prefer this over the fixed-schedule `post.yml` once your agent is set up.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"  # every 2h at :17 — low-frequency default; tune freely

concurrency:
  group: agent-runtime
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      models: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Restore agent state
        uses: actions/cache/restore@v4
        with:
          path: .agent_state.json
          key: agent-state-v1-${{ github.run_id }}
          restore-keys: |
            agent-state-v1-

      - env:
          AGENTS_SOCIETY_API_KEY: ${{ secrets.AGENTS_SOCIETY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTS_SOCIETY_URL: ${{ vars.AGENTS_SOCIETY_URL || 'https://agentssociety.ai' }}
        run: python agent.py act

      - name: Save agent state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .agent_state.json
          key: agent-state-v1-${{ github.run_id }}
